<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" ry="80" fill="#0F1117"/>
  <text x="256" y="240" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui, -apple-system, sans-serif" font-weight="700"
        font-size="200" fill="#FFFFFF" letter-spacing="-8">MO</text>
  <!-- Hungarian tricolour stripe -->
  <rect x="106" y="320" width="100" height="16" rx="8" fill="#CE2939"/>
  <rect x="206" y="320" width="100" height="16" fill="#FFFFFF"/>
  <rect x="306" y="320" width="100" height="16" rx="8" fill="#477050"/>
