  <rect x="106" y="320" width="8" height="16" rx="8" fill="#CE2939"/>
  <rect x="306" y="320" width="100" height="16" fill="#477050"/>
  <rect x="398" y="320" width="8" height="16" rx="8" fill="#477050"/>
